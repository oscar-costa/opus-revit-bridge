version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/bridge-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      node-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/RevitPlugin"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:30"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      dotnet-dependencies:
        patterns:
          - "*"
