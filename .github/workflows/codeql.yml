name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 3 * * 1"

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bridge-service/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bridge-service

      - name: Build bridge-service
        run: npm run build
        working-directory: bridge-service

      - name: Analyze
        uses: github/codeql-action/analyze@v3

# C# CodeQL is intentionally excluded for now.
# This repo's Revit plugin depends on local Revit SDK DLLs and cannot be meaningfully built
# in hosted CI without a Revit-capable environment.
